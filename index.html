<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lenslab Creative</title>

  <link rel="stylesheet" href="lens.css">
</head>
<body>
<nav>

  <div class="logo">
    Lenslab Creative
  </div>

  <ul class="nav-links">

    <li><a href="#">Home</a></li>
    <li><a href="#">Pricing</a></li>
    <li><a href="#">Gallery</a></li>
    <li><a href="#">Contact</a></li>

  </ul>

</nav>
 <section class="hero">

  <video autoplay muted loop playsinline class="bg-video">

    <source src="udo.mp4" type="video/mp4">

  </video>

  <div class="overlay"></div>

  <div class="hero-content">

    <h1>Lenslab Creative</h1>

    <p>Capturing Moments Beyond Imagination</p>

    <button class="hero-btn">Book A Shoot</button>

  </div>

</section>
  <section class="pricing">

  <h2>Photography Packages</h2>

  <div class="cards">

    <div class="card">
      <h3>Portrait Shoot</h3>
      <p>₦25,000</p>
      <button class="book-now" data-package="Portrait Shoot">
  Book Now
</button>
    </div>

    <div class="card">
      <h3>Birthday Shoot</h3>
      <p>₦40,000</p>
      <button class="book-now" data-package="Birthday Shoot">
  Book Now
</button>
    </div>

    <div class="card">
      <h3>Wedding Coverage</h3>
      <p>₦250,000</p>
      <button class="book-now" data-package="Wedding Coverage">
  Book Now
</button>
    </div>

  </div>

</section>
  <section class="gallery">

  <h2>My Portfolio</h2>

  <div class="gallery-container">

    <div class="gallery-item">
      <img src="  A1.jpg" alt="">
    </div>

    <div class="gallery-item">
      <img src="A2.jpg" alt="">
    </div>

    <div class="gallery-item">
      <img src="A3.jpg" alt="">
    </div>

    <div class="gallery-item">
      <img src="A4.jpg" alt="">
    </div>

  </div>

</section>
<div class="popup" id="bookingPopup">

  <div class="popup-content">

    <span class="close-btn">&times;</span>

    <h2>Book A Shoot</h2>

    <form>

      <input type="text" placeholder="Your Name" required>

      <input type="email" placeholder="Your Email" required>

      <select>

        <option>Select Shoot Type</option>
        <option>Portrait Shoot</option>
        <option>Birthday Shoot</option>
        <option>Wedding Coverage</option>

      </select>

      <input type="date">

      <button type="submit">Proceed To Payment</button>

    </form>

  </div>

</div>
  <script src="script.js"></script>
</body>
</html>
